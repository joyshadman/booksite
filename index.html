<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookNest | Digital Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: radial-gradient(circle at top right, #1e1b4b, #020617 40%);
      }
      
      .glass { 
        background: rgba(15, 23, 42, 0.6); 
        backdrop-filter: blur(16px); 
        border: 1px solid rgba(255, 255, 255, 0.08); 
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      .glass-card {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .glass-card:hover {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(139, 92, 246, 0.3);
        transform: translateY(-8px);
        box-shadow: 0 20px 40px -15px rgba(139, 92, 246, 0.15);
      }

      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
      }

      .mesh-circle {
        position: absolute;
        filter: blur(100px);
        border-radius: 50%;
        opacity: 0.15;
      }

      .btn-primary {
        background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
  </head>
  <body class="min-h-screen text-slate-200 selection:bg-violet-500/30">
    
    <!-- Animated Background Decor -->
    <div class="mesh-bg">
        <div class="mesh-circle bg-violet-600 w-[500px] h-[500px] -top-20 -left-20"></div>
        <div class="mesh-circle bg-fuchsia-600 w-[400px] h-[400px] bottom-0 right-0"></div>
    </div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 w-full border-b border-white/5 bg-[#020617]/40 backdrop-blur-xl">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-8 py-5">
        <div class="flex items-center gap-3 group cursor-pointer">
          <div class="relative h-10 w-10 overflow-hidden rounded-xl bg-gradient-to-br from-violet-500 to-fuchsia-500 p-[2px]">
            <div class="flex h-full w-full items-center justify-center rounded-[10px] bg-[#020617] group-hover:bg-transparent transition-colors">
                 <span class="text-white font-bold text-xl">B</span>
            </div>
          </div>
          <h1 class="text-2xl font-extrabold tracking-tight text-white italic">Book<span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400">Nest</span></h1>
        </div>

        <div id="navActions" class="flex items-center gap-6">
          <div id="loggedOutLinks" class="flex items-center gap-3">
            <button onclick="toggleAuthModal('login')" class="px-5 py-2 text-sm font-semibold text-slate-300 hover:text-white transition-colors">Login</button>
            <button onclick="toggleAuthModal('signup')" class="btn-primary rounded-xl px-6 py-2.5 text-sm font-bold text-white active:scale-95">Sign Up</button>
          </div>
          <div id="loggedInLinks" class="hidden flex items-center gap-4">
            <div class="h-8 w-[1px] bg-white/10 mx-2"></div>
            <span id="userDisplay" class="text-sm font-medium text-slate-400"></span>
            <button id="logoutBtn" class="rounded-xl border border-white/10 px-5 py-2 text-sm font-semibold hover:bg-white/5 transition-all">Logout</button>
          </div>
        </div>
      </div>
    </nav>

    <main class="mx-auto max-w-7xl px-8 py-20">
      <!-- Search Section -->
      <header class="mb-20 text-center">
        <h2 class="text-5xl md:text-6xl font-black text-white mb-6 tracking-tight leading-tight">
          Unlock the World of <br/>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 via-fuchsia-400 to-amber-400">Infinite Stories.</span>
        </h2>
        <p class="text-slate-400 text-lg mb-10 max-w-xl mx-auto">Explore thousands of digital books, track your reading progress, and build your personal collection.</p>
        
        <form id="searchForm" class="mx-auto max-w-3xl relative group">
          <div class="absolute -inset-1 rounded-[2rem] bg-gradient-to-r from-violet-600/20 to-fuchsia-600/20 blur opacity-75 group-focus-within:opacity-100 transition duration-500"></div>
          <div class="relative flex items-center bg-slate-900/80 border border-white/10 rounded-[1.5rem] p-2 pr-3 backdrop-blur-md">
              <input
                id="searchInput"
                type="text"
                placeholder="Search titles, authors, or genres..."
                class="w-full bg-transparent px-6 py-3 text-lg text-white outline-none placeholder:text-slate-500"
              />
              <button type="submit" class="btn-primary rounded-2xl px-8 py-3 font-bold text-white shadow-xl">
                Search
              </button>
          </div>
        </form>
      </header>

      <!-- Content Grids -->
      <div id="appSection" class="space-y-24">
        <section>
          <div class="mb-10 flex items-end justify-between">
            <div>
                <h3 class="text-3xl font-bold text-white mb-2">Trending Now</h3>
                <p class="text-slate-500">Handpicked favorites from our community</p>
            </div>
            <div class="flex gap-2">
                <button id="prevPageBtn" class="glass h-12 w-12 rounded-xl flex items-center justify-center hover:bg-white/10 disabled:opacity-20 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <button id="nextPageBtn" class="glass h-12 w-12 rounded-xl flex items-center justify-center hover:bg-white/10 disabled:opacity-20 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
          </div>
          
          <div id="booksGrid" class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
              <!-- Example Card Structure for JS injection reference -->
              <!-- <div class="glass-card rounded-[2rem] p-4 flex flex-col h-full"> ... </div> -->
          </div>

          <div class="mt-12 flex justify-center">
            <span id="pageInfo" class="px-6 py-2 rounded-full glass text-xs font-bold uppercase tracking-widest text-violet-400 border border-violet-500/20">
                Page 1 of 12
            </span>
          </div>
        </section>

        <section id="favoritesSection" class="hidden">
          <div class="mb-10">
            <h3 class="text-3xl font-bold text-amber-400">My Favorites</h3>
            <div class="h-1 w-20 bg-amber-400/50 rounded-full mt-2"></div>
          </div>
          <div id="favoritesGrid" class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
        </section>
      </div>
    </main>

    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 z-[60] flex hidden items-center justify-center p-4">
      <div class="absolute inset-0 bg-[#020617]/90 backdrop-blur-md" onclick="toggleAuthModal()"></div>
      <div class="glass relative w-full max-w-md overflow-hidden rounded-[2.5rem] p-10 shadow-2xl">
        <div class="mb-10 flex items-center justify-between">
          <h2 id="modalTitle" class="text-3xl font-black text-white">Welcome</h2>
          <button onclick="toggleAuthModal()" class="h-10 w-10 rounded-full glass flex items-center justify-center text-slate-400 hover:text-white transition-all">✕</button>
        </div>

        <div id="authFormContainer"></div>

        <div class="mt-8 pt-8 border-t border-white/5">
            <p class="text-center text-sm text-slate-400">
                <span id="toggleText">Don't have an account?</span>
                <button id="toggleAuthMode" class="ml-1 font-bold text-violet-400 hover:text-fuchsia-400 transition-colors">Create Account</button>
            </p>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] hidden">
        <div class="glass px-8 py-4 rounded-2xl flex items-center gap-3 border-violet-500/30">
            <div class="h-2 w-2 rounded-full bg-violet-500 animate-pulse"></div>
            <span class="text-sm font-bold tracking-wide">Notification active</span>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
